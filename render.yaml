# render.yaml — Render.com deployment config for the backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hostelbuddy-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard (keep secret)
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard (keep secret)
